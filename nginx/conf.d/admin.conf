upstream dashboard_upstream {
    server dashboard:3001;
}

server {
    listen 80;
    server_name admin.alshisr.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.alshisr.com;

    ssl_certificate /etc/letsencrypt/live/alshisr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alshisr.com/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
