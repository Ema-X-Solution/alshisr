name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Copy environment file
        run: cp /var/www/alshisr/.env $GITHUB_WORKSPACE/.env

      - name: Build all services
        run: docker compose -f docker/docker-compose.yml build

      - name: Start / recreate containers
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Restart nginx to pick up new container IPs
        run: docker compose -f docker/docker-compose.yml restart nginx

      - name: Wait for containers to settle
        run: sleep 20

      - name: Health check - backend
        run: |
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:4000/api/v1/health > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 5
          done
          echo "Backend health check failed — container logs:"
          docker compose -f docker/docker-compose.yml logs backend --tail=80 || true
          exit 1

      - name: Health check - frontend
        run: |
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend... ($i/15)"
            sleep 5
          done
          echo "Frontend health check failed — container logs:"
          docker compose -f docker/docker-compose.yml logs frontend --tail=80 || true
          exit 1

      - name: Health check - dashboard
        run: |
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:3001/ > /dev/null 2>&1; then
              echo "Dashboard is up"
              exit 0
            fi
            echo "Waiting for dashboard... ($i/15)"
            sleep 5
          done
          echo "Dashboard health check failed — container logs:"
          docker compose -f docker/docker-compose.yml logs dashboard --tail=80 || true
          exit 1

      - name: Clean up old images
        if: always()
        run: docker image prune -f
